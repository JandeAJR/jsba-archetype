# ======================================================================================================
# Spring Boot Convention: application-{profile}.yml
#      
# Profiles da aplicação:      prod, develop, homolog, test
# Profiles para autenticação: valores definidos em authentication.oauth2.strategies (application.yml)
#
# Profile: test
# Descrição: Profile de teste para rodar a aplicação com banco de dados em memória.
# ======================================================================================================

spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 20
      connection-timeout: 30000  # 30 segundos
      idle-timeout: 600000       # 10 minutos
      max-lifetime: 1800000      # 30 minutos

  jpa:
    show-sql: true
    open-in-view: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 30  # Melhora performance em inserts/updates em lote
        order_inserts: true
        order_updates: true        
        boot.allow_jdbc_metadata_access: true  # Deve ser true para banco H2 em memória 

  flyway:
    enabled: false

cors:
  allowed-origins: "*"

frontend-home-page: ${APP_FRONTEND_HOME_PAGE:http://localhost:3000/home}
frontend-login-page: ${APP_FRONTEND_LOGIN_PAGE:http://localhost:3000/login}

logging:
  level:
    com.zaxxer.hikari: trace

project:
  database: "H2 in memory"
  profile: "Teste"
